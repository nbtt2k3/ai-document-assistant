services:
  web-api:
    build:
      context: ./web-api
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
      - ai-agent
    volumes:
      - ./web-api:/app
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-rag_user}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-rag_db}

      # Auth
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}

      # Internal services
      AI_AGENT_URL: ${AI_AGENT_URL:-http://ai-agent:8001}

      # Browser clients
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}

      # Limits
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-50}

  ai-agent:
    build:
      context: ./ai-agent
    restart: always
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - ./ai-agent:/app
      - ./ai-agent/models/ocr:/root/.paddleocr
    command: uvicorn src.app.main:app --host 0.0.0.0 --port 8001
    environment:
      # Database credentials for evaluation scripts
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-rag_user}
      DB_PASS: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      DB_NAME: ${POSTGRES_DB:-rag_db}

      # Runtime paths inside the container
      STORAGE_DIR: /app/storage
      DATA_PATH: /app/storage/uploads
      VECTORSTORE_PATH: /app/storage/chroma_db
      DOCSTORE_PATH: /app/storage/docstore
      FLASHRANK_CACHE: /app/models/reranker

      # Local models on the host machine
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL:-llama3.1:8b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-bge-m3}

      # Download mirrors
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}

      # Online Reranker
      COHERE_API_KEY: ${COHERE_API_KEY:-}

      # Browser/API clients
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000,http://web-api:8000}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - web-api
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-rag_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  frontend_node_modules:
