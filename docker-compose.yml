services:
  web-api:
    build:
      context: ./web-api
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
      - ai-agent
    volumes:
      - ./web-api:/app
    environment:
      # Database
      DATABASE_URL: postgresql://rag_user:rag_password@db:5432/rag_db

      # Auth
      SECRET_KEY: supper_secret_key_change_me_in_production

      # Internal services
      AI_AGENT_URL: http://ai-agent:8001

      # Browser clients
      ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000

  ai-agent:
    build:
      context: ./ai-agent
    restart: always
    ports:
      - "8001:8001"
    volumes:
      - ./ai-agent:/app
      - ./ai-agent/models/ocr:/root/.paddleocr
    environment:
      # Runtime paths inside the container
      STORAGE_DIR: /app/storage
      DATA_PATH: /app/storage/uploads
      VECTORSTORE_PATH: /app/storage/chroma_db
      DOCSTORE_PATH: /app/storage/docstore
      FLASHRANK_CACHE: /app/models/reranker

      # Local models on the host machine
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_LLM_MODEL: llama3.1:8b
      OLLAMA_EMBEDDING_MODEL: bge-m3

      # Download mirrors
      HF_ENDPOINT: https://hf-mirror.com

      # Online Reranker
      COHERE_API_KEY: ${COHERE_API_KEY:-}

      # Browser/API clients
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8000,http://web-api:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
      POSTGRES_DB: rag_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
